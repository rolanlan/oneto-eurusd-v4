<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONETO — EUR/USD AI Signal Tool v4.0</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles (load order: base → layout → components → feature-specific) -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/risk-manager.css">
  <link rel="stylesheet" href="styles/committee.css">
  <link rel="stylesheet" href="styles/decision.css">
  <link rel="stylesheet" href="styles/kline.css">
  <link rel="stylesheet" href="styles/paper-trade.css">

  <!-- TradingView Lightweight Charts v4 (for KLinePanel) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

  <!-- Chart.js (for MACD + RSI sub-charts) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>

<body>
  <div id="app">

    <!-- ── Sidebar ──────────────────────────────────────── -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <span class="sidebar-logo-text">ONETO</span>
        <span class="sidebar-logo-badge">v4.0</span>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Signal group -->
        <span class="nav-group-label" data-i18n="nav.signal">Signal</span>
        <a class="nav-item active" data-page="dashboard" href="#">
          <span class="nav-item-icon">📊</span>
          <span class="nav-item-label" data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a class="nav-item" data-page="kline" href="#">
          <span class="nav-item-icon">📈</span>
          <span class="nav-item-label" data-i18n="nav.kline">K-Line Chart</span>
        </a>

        <!-- Analysis group -->
        <span class="nav-group-label" data-i18n="nav.analysis">Analysis</span>
        <a class="nav-item" data-page="committee" href="#">
          <span class="nav-item-icon">🧠</span>
          <span class="nav-item-label" data-i18n="nav.committee">AI Committee</span>
        </a>
        <a class="nav-item" data-page="decision" href="#">
          <span class="nav-item-icon">⚡</span>
          <span class="nav-item-label" data-i18n="nav.decision">Decision Engine</span>
        </a>
        <a class="nav-item" data-page="risk" href="#">
          <span class="nav-item-icon">🛡️</span>
          <span class="nav-item-label" data-i18n="nav.risk">Risk Manager</span>
        </a>

        <!-- Trading group -->
        <span class="nav-group-label" data-i18n="nav.trading">Trading</span>
        <a class="nav-item" data-page="paper" href="#">
          <span class="nav-item-icon">📝</span>
          <span class="nav-item-label" data-i18n="nav.paper">Paper Trading</span>
        </a>

        <!-- Config group -->
        <span class="nav-group-label" data-i18n="nav.config">Config</span>
        <a class="nav-item" data-page="settings" href="#">
          <span class="nav-item-icon">⚙️</span>
          <span class="nav-item-label" data-i18n="nav.settings">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- ── Topbar ────────────────────────────────────────── -->
    <header id="topbar">
      <span id="topbar-price" class="topbar-price">—.—————</span>
      <span id="topbar-change" class="topbar-change">—</span>
      <span id="topbar-source" class="topbar-source simulated">SIM</span>

      <!-- Language toggle -->
      <div id="lang-toggle">
        <button class="lang-toggle-btn" data-lang="zh">中文</button>
        <button class="lang-toggle-btn" data-lang="en">EN</button>
      </div>
    </header>

    <!-- ── Content ──────────────────────────────────────── -->
    <main id="content">

      <!-- Dashboard page -->
      <section class="page active" id="page-dashboard">
        <div class="dashboard-grid">
          <div class="dashboard-left">
            <div id="hero-mount"></div>
          </div>
          <div class="dashboard-right">
            <div id="kline-dash-mount"></div>
          </div>
        </div>
      </section>

      <!-- K-Line page -->
      <section class="page" id="page-kline">
        <div id="kline-full-mount"></div>
      </section>

      <!-- Committee page -->
      <section class="page" id="page-committee">
        <div id="committee-mount"></div>
      </section>

      <!-- Decision Engine page -->
      <section class="page" id="page-decision">
        <div id="decision-mount"></div>
      </section>

      <!-- Risk Manager page -->
      <section class="page" id="page-risk">
        <div id="risk-mount"></div>
      </section>

      <!-- Paper Trading page -->
      <section class="page" id="page-paper">
        <div id="paper-mount"></div>
      </section>

      <!-- Settings page -->
      <section class="page" id="page-settings">
        <div id="settings-mount"></div>
      </section>

    </main>
  </div><!-- /#app -->

  <!-- ── Bootstrap module ─────────────────────────────── -->
  <script type="module">
    // ── Imports ──────────────────────────────────────────
    import * as AppState     from './src/state/AppState.js';
    import * as AccountState from './src/state/AccountState.js';
    import { getLang, setLang, t } from './src/i18n/i18n.js';

    // Components
    import * as HeroPanel        from './src/components/HeroPanel.js';
    import * as CommitteePanel   from './src/components/CommitteePanel.js';
    import * as DecisionPanel    from './src/components/DecisionPanel.js';
    import * as RiskManagerPanel from './src/components/RiskManagerPanel.js';
    import * as KLinePanel       from './src/components/KLinePanel.js';
    import * as PaperTradePanel  from './src/components/PaperTradePanel.js';
    import * as SettingsPanel    from './src/components/SettingsPanel.js';

    // ── Mount all panels ─────────────────────────────────
    HeroPanel.mount(document.getElementById('hero-mount'));
    KLinePanel.mount(document.getElementById('kline-dash-mount'));

    CommitteePanel.mount(document.getElementById('committee-mount'));
    DecisionPanel.mount(document.getElementById('decision-mount'));
    RiskManagerPanel.mount(document.getElementById('risk-mount'));
    PaperTradePanel.mount(document.getElementById('paper-mount'));
    SettingsPanel.mount(document.getElementById('settings-mount'));

    // KLine full page — separate instance
    let _klineFullMounted = false;

    // ── Navigation ────────────────────────────────────────
    const pages = document.querySelectorAll('.page');
    const navItems = document.querySelectorAll('.nav-item[data-page]');

    function showPage(pageId) {
      pages.forEach(p => p.classList.remove('active'));
      navItems.forEach(n => n.classList.remove('active'));

      const page = document.getElementById(`page-${pageId}`);
      const nav  = document.querySelector(`.nav-item[data-page="${pageId}"]`);
      if (page) page.classList.add('active');
      if (nav)  nav.classList.add('active');

      // Lazy-mount full-page K-Line on first visit
      if (pageId === 'kline' && !_klineFullMounted) {
        const mount = document.getElementById('kline-full-mount');
        if (mount) {
          KLinePanel.mount(mount);
          _klineFullMounted = true;
        }
      }

      // Refresh K-line when switching to it
      if (pageId === 'kline') {
        setTimeout(() => KLinePanel.refresh?.(), 50);
      }

      // Store last visited page
      try { localStorage.setItem('oneto_last_page', pageId); } catch(_) {}
    }

    navItems.forEach(item => {
      item.addEventListener('click', e => {
        e.preventDefault();
        showPage(item.dataset.page);
      });
    });

    // Restore last page
    try {
      const last = localStorage.getItem('oneto_last_page') ?? 'dashboard';
      showPage(last);
    } catch(_) {
      showPage('dashboard');
    }

    // ── Language toggle ────────────────────────────────────
    document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    function _syncLangButtons() {
      const lang = getLang();
      document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    }

    window.addEventListener('languagechange', () => {
      _syncLangButtons();
      _updateNavLabels();
      _updateTopbar();
    });

    _syncLangButtons();

    // ── Nav label i18n ─────────────────────────────────────
    function _updateNavLabels() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        const val = t(key);
        if (val && val !== key) el.textContent = val;
      });
    }
    _updateNavLabels();

    // ── Topbar updates ─────────────────────────────────────
    function _updateTopbar() {
      const price    = AppState.getCurrentPrice();
      const prev     = AppState.getPrevClose();
      const source   = AppState.getDataSource();
      const lang     = getLang();

      const priceEl  = document.getElementById('topbar-price');
      const changeEl = document.getElementById('topbar-change');
      const sourceEl = document.getElementById('topbar-source');

      if (priceEl && price > 0) {
        priceEl.textContent = price.toFixed(5);
      }

      if (changeEl && price > 0 && prev > 0) {
        const diff   = price - prev;
        const pips   = Math.round(diff / 0.0001);
        const pct    = (diff / prev * 100).toFixed(3);
        const sign   = pips >= 0 ? '+' : '';
        const unit   = lang === 'zh' ? '点' : ' pips';
        changeEl.textContent = `${sign}${pips}${unit} (${sign}${pct}%)`;
        changeEl.className   = `topbar-change ${pips >= 0 ? 'positive' : 'negative'}`;
      }

      if (sourceEl) {
        const labels = {
          live:      { en: 'LIVE',  zh: '实时',  cls: 'live'      },
          cached:    { en: 'CACHE', zh: '缓存',  cls: 'cached'    },
          simulated: { en: 'SIM',   zh: '模拟',  cls: 'simulated' },
        };
        const s = labels[source] ?? labels.simulated;
        sourceEl.textContent = s[lang] ?? s.en;
        sourceEl.className   = `topbar-source ${s.cls}`;
      }
    }

    AppState.subscribe('stateUpdated', () => _updateTopbar());
    _updateTopbar();

    // ── Auto-refresh ───────────────────────────────────────
    AppState.startAutoRefresh(240_000);   // 4-minute refresh cycle

  </script>
</body>
</html>
